<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Page Not Found | Ameris Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0a1628; color:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
        h1 { font-size:6rem; font-weight:800; background:linear-gradient(135deg,#d4a843,#e8c96a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
        h2 { font-size:1.5rem; margin:16px 0 8px; }
        p { color:#94a3b8; font-size:1rem; margin-bottom:24px; }
        a { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; background:linear-gradient(135deg,#d4a843,#e8c96a); color:#0a1628; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.9rem; transition:all 0.3s; }
        a:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(212,168,67,0.4); }
    </style>
</head>
<body>

    <div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">&larr; Back to Ameris Global</a>
    </div>
</body>
