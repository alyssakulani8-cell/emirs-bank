<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="50%" style="stop-color:#e8c96a"/>
      <stop offset="100%" style="stop-color:#b8912e"/>
    </linearGradient>
    <linearGradient id="darkGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="100%" style="stop-color:#6b4f0e"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#132244"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield Background -->
  <path d="M200 30 L340 110 L340 260 Q340 380 200 460 Q60 380 60 260 L60 110 Z"
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Shield Inner Border -->
  <path d="M200 50 L320 120 L320 255 Q320 365 200 440 Q80 365 80 255 L80 120 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Lion Body -->
  <g filter="url(#glow)">
    <!-- Lion Main Body -->
    <ellipse cx="200" cy="310" rx="55" ry="40" fill="url(#goldGrad)" opacity="0.9"/>

    <!-- Lion Mane -->
    <circle cx="200" cy="230" r="55" fill="url(#goldGrad)" opacity="0.6"/>
    <circle cx="200" cy="230" r="48" fill="url(#darkGoldGrad)" opacity="0.3"/>
    <circle cx="200" cy="230" r="40" fill="url(#goldGrad)"/>

    <!-- Lion Face -->
    <ellipse cx="200" cy="235" rx="28" ry="25" fill="#f5d98a"/>

    <!-- Eyes -->
    <ellipse cx="188" cy="228" rx="5" ry="4" fill="#0a1628"/>
    <ellipse cx="212" cy="228" rx="5" ry="4" fill="#0a1628"/>
    <circle cx="189" cy="227" r="1.5" fill="white"/>
    <circle cx="213" cy="227" r="1.5" fill="white"/>

    <!-- Nose -->
    <path d="M195 240 Q200 236 205 240 L200 246 Z" fill="#0a1628"/>

    <!-- Mouth -->
    <path d="M193 246 Q200 252 207 246" fill="none" stroke="#0a1628" stroke-width="1.2"/>

    <!-- Ears -->
    <ellipse cx="172" cy="208" rx="12" ry="10" fill="url(#goldGrad)"/>
    <ellipse cx="172" cy="208" rx="7" ry="5" fill="#3a2a0a"/>
    <ellipse cx="228" cy="208" rx="12" ry="10" fill="url(#goldGrad)"/>
    <ellipse cx="228" cy="208" rx="7" ry="5" fill="#3a2a0a"/>

    <!-- Mane Spikes -->
    <path d="M155 215 L140 200 L158 210" fill="url(#goldGrad)" opacity="0.7"/>
    <path d="M148 230 L128 220 L150 228" fill="url(#goldGrad)" opacity="0.7"/>
    <path d="M152 248 L132 245 L154 245" fill="url(#goldGrad)" opacity="0.7"/>
    <path d="M245 215 L260 200 L242 210" fill="url(#goldGrad)" opacity="0.7"/>
    <path d="M252 230 L272 220 L250 228" fill="url(#goldGrad)" opacity="0.7"/>
    <path d="M248 248 L268 245 L246 245" fill="url(#goldGrad)" opacity="0.7"/>

    <!-- Front Legs -->
    <path d="M170 340 L158 390 Q155 400 165 400 L175 400 Q180 400 178 390 Z" fill="url(#goldGrad)"/>
    <path d="M230 340 L242 390 Q245 400 235 400 L225 400 Q220 400 222 390 Z" fill="url(#goldGrad)"/>

    <!-- Paws -->
    <ellipse cx="166" cy="400" rx="12" ry="6" fill="url(#darkGoldGrad)"/>
    <ellipse cx="234" cy="400" rx="12" ry="6" fill="url(#darkGoldGrad)"/>

    <!-- Tail -->
    <path d="M245 320 Q280 300 290 270 Q295 260 285 265 Q275 270 270 280"
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="285" cy="265" rx="8" ry="5" fill="url(#goldGrad)" transform="rotate(-30 285 265)"/>
  </g>

  <!-- Crown -->
  <g transform="translate(160, 100)">
    <path d="M0 40 L10 10 L20 30 L30 0 L40 30 L50 10 L60 40 Z"
          fill="url(#goldGrad)" stroke="#6b4f0e" stroke-width="1"/>
    <rect x="0" y="40" width="60" height="10" rx="2" fill="url(#goldGrad)"/>
    <circle cx="30" cy="50" r="4" fill="#6b4f0e" opacity="0.5"/>
    <circle cx="10" cy="50" r="3" fill="#6b4f0e" opacity="0.3"/>
    <circle cx="50" cy="50" r="3" fill="#6b4f0e" opacity="0.3"/>
  </g>

  <!-- Ribbon Banner -->
  <path d="M100 440 L200 425 L300 440 L290 455 L200 442 L110 455 Z"
        fill="url(#goldGrad)"/>

  <!-- Text Under Shield -->
  <text x="200" y="485" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-weight="700" letter-spacing="6"
        fill="url(#goldGrad)">AMERIS
  </text>
  <text x="200" y="510" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" letter-spacing="8"
        fill="url(#goldGrad)" opacity="0.8">GLOBAL
  </text>
  <text x="200" y="530" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="8" letter-spacing="4"
        fill="url(#goldGrad)" opacity="0.5">FDIC MEMBER
  </text>
</svg>
